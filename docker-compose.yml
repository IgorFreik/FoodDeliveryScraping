
x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  shm_size: 2gb
  environment: &airflow-env
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://scraper:${POSTGRES_PASSWORD:-scraper123}@postgres:5432/airflow
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-supersecretkey}
    # App-level env vars passed to DAGs
    SCRAPER_DB_URL: postgresql+psycopg2://scraper:${POSTGRES_PASSWORD:-scraper123}@postgres:5432/scraping
    MINIO_ENDPOINT: http://minio:9000
    MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
    MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin123}
    BRIGHTDATA_PROXY_HOST: ${BRIGHTDATA_PROXY_HOST:-}
    BRIGHTDATA_PROXY_PORT: ${BRIGHTDATA_PROXY_PORT:-}
    BRIGHTDATA_PROXY_USER: ${BRIGHTDATA_PROXY_USER:-}
    BRIGHTDATA_PROXY_PASS: ${BRIGHTDATA_PROXY_PASS:-}
    BRIGHTDATA_BROWSER_URL: ${BRIGHTDATA_BROWSER_URL:-}
    KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./scrapers:/opt/airflow/scrapers
    - ./processing:/opt/airflow/processing
    - ./storage:/opt/airflow/storage
    - ./config:/opt/airflow/config
    - ./analytics:/opt/airflow/analytics
    - ./streaming:/opt/airflow/streaming
  depends_on:
    postgres:
      condition: service_healthy

services:
  # ── PostgreSQL + PostGIS ──────────────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: scraper
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scraper123}
      POSTGRES_DB: scraping
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./storage/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scraper -d scraping"]
      interval: 10s
      retries: 5
      start_period: 30s

  # ── Kafka (KRaft mode) ────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.7.1
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@localhost:29093'
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: 'ci-pipeline-cluster-123'
    volumes:
      - kafkadata:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      retries: 5
      start_period: 20s

  # ── Parser Consumer ───────────────────────────────────────────────
  parser-consumer:
    <<: *airflow-common
    command: ["python", "streaming/parser_consumer.py"]
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # ── MinIO (S3-compatible) ─────────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      retries: 5
      start_period: 10s

  # ── MinIO bucket initializer ──────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin123};
        mc mb --ignore-existing local/raw-html;
        mc mb --ignore-existing local/parsed-json;
        echo 'Buckets created.';
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}

  # ── Airflow: DB init (one-shot) ──────────────────────────────────
  airflow-init:
    <<: *airflow-common
    entrypoint: >
      /bin/bash -c "
        airflow db migrate &&
        airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true
      "
    restart: "no"

  # ── Airflow Webserver ─────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ── Airflow Scheduler ─────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ── Prometheus ────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - promdata:/prometheus

  # ── Grafana ───────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000" # Expose on 3001 to avoid Metabase conflict
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafanadata:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus

volumes:
  pgdata:
  miniodata:
  kafkadata:
  promdata:
  grafanadata:
